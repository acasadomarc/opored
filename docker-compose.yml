services:

## Core services
  kafka:
    image: confluentinc/cp-kafka:7.7.7
    platform: linux/amd64
    ports:
      - "29092:9092"
      - "19092:19092"
    environment: # Kafka is configured in Kraft mode, so ZooKeeper is not necessary
        KAFKA_NODE_ID: 1
        CLUSTER_ID: VMJEV5krQCa2-LRQQD8IPQ
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./data/kafka:/var/lib/kafka
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Service to restart the containers if their status becomes "unhealthy"
  autoheal:
    image: willfarrell/autoheal
    platform: linux/amd64
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

## Database service

  opodb:
    image: mariadb:11.4
    platform: linux/amd64
    restart: always
    ports:
      - 3308:3306
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
    - ./db-init:/docker-entrypoint-initdb.d # Init data
    - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s       
      timeout: 5s         
      retries: 5          
      start_period: 30s
    
## Microservices

  opored:
    image: ghcr.io/acasadomarc/opored:1.0.0
    platform: linux/amd64
    depends_on:
      opodb:
        condition: service_healthy
      kafka:                      
        condition: service_healthy
    volumes:
      - ./uploads:/storage/uploads # Path to file storage
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"
      interval: 15s      
      timeout: 5s
      retries: 5
      start_period: 30s
  
  opored-scraping:
    image: ghcr.io/acasadomarc/opored-scraping:1.0.0
    platform: linux/amd64
    depends_on:
      kafka:                      
        condition: service_healthy
      opored:                      
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "18082:18082"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:18082/actuator/health || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/acasadomarc/opored-frontend:local
    platform: linux/amd64
    depends_on:
      - opored
    environment:
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL}
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s